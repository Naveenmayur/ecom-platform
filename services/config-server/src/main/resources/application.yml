server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/Naveenmayur/ecom-platform-config.git   # We will create this repo later
          default-label: main
          search-paths: '{application}'
          clone-on-start: true
          timeout: 60
  config:
    import: optional:configserver:http://localhost:8888

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always